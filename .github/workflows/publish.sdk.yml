# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://help.github.com/actions/language-and-framework-guides/publishing-nodejs-packages

name: KF SDK Publish

on:
    release:
        types: [created]

        # Allows you to run this workflow manually from the Actions tab on GitHub.
    workflow_dispatch:

jobs:
    publish-npm:
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22.12.0
                  registry-url: https://registry.npmjs.org/

            - name: setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9.15.0

            - name: install dependencies
              run: pnpm install --filter=@kissflow/lowcode-client-sdk --no-lockfile --strict-peer-dependencies=false

            - name: git config
              run: |
                  git config --global user.email "madurai.vivekanandan@gmail.com"
                  git config --global user.name "vivekmadurai"

            - name: Run build
              run: pnpm run build:sdk

            # disabled automatic version pump as it is conflicting with internal versioning
            # - name: pump package version
            #   run:  pnpm version patch

            - name: Publish package to npm
              run: pnpm publish:sdk --no-git-checks
              env:
                  NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
